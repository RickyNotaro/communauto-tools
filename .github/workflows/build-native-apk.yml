name: Build Native Android APK

on:
  push:
    branches:
      - 'claude/native-android-*'
      - 'native-app'
    paths:
      - 'android-native/**'
      - '.github/workflows/build-native-apk.yml'
  pull_request:
    branches: [master]
    paths:
      - 'android-native/**'
      - '.github/workflows/build-native-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: android-native

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.11.1

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          # Maps API key (optional — set as repo secret for production)
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: communauto-native-debug
          path: android-native/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
